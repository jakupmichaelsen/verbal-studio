name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check
      - name: Run tests
        run: cargo test
      - name: Build
        run: cargo build
      - name: Check Python helpers
        run: python3 -m py_compile scripts/*.py
